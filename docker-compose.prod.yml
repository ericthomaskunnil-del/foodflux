services:
  # MongoDB Database Service
  mongo:
    image: mongo:6
    container_name: lfds-mongo-prod
    restart: unless-stopped
    # No ports exposed to host for security — only accessible within Docker network
    volumes:
      - mongo-data:/data/db
    networks:
      - lfds-network

  # Node.js Application Service (pulled from Docker Hub in production)
  app:
    build: .
    container_name: lfds-app-prod
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/lfds
      - SESSION_SECRET=${SESSION_SECRET}
      - NODE_ENV=production
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
    depends_on:
      - mongo
    networks:
      - lfds-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: lfds-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - lfds-network

volumes:
  mongo-data:

networks:
  lfds-network:
    driver: bridge
