name: "CI/CD — Build & Deploy Food Flux to AWS EC2"

on:
  push:
    branches: [main]

jobs:
  # ─── Job 1: Build Docker Image & Push to Docker Hub ──────────────
  build:
    name: Build Docker Image & Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/foodflux:latest
            ${{ secrets.DOCKER_USERNAME }}/foodflux:${{ github.sha }}

  # ─── Job 2: Deploy to AWS EC2 via SSH ────────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Create project directory and nginx config folder
            mkdir -p ~/foodflux/nginx

            # Write docker-compose.yml for production
            cat > ~/foodflux/docker-compose.yml << 'COMPOSEEOF'
            services:
              mongo:
                image: mongo:6
                container_name: lfds-mongo-prod
                restart: unless-stopped
                volumes:
                  - mongo-data:/data/db
                networks:
                  - lfds-network

              app:
                image: DOCKER_USER_PLACEHOLDER/foodflux:latest
                container_name: lfds-app-prod
                restart: unless-stopped
                expose:
                  - "3000"
                environment:
                  - PORT=3000
                  - MONGODB_URI=mongodb://mongo:27017/lfds
                  - SESSION_SECRET=SESSION_SECRET_PLACEHOLDER
                  - NODE_ENV=production
                  - GMAIL_USER=beckhamm26@gmail.com
                  - GMAIL_APP_PASSWORD=GMAIL_PLACEHOLDER
                depends_on:
                  - mongo
                networks:
                  - lfds-network

              nginx:
                image: nginx:alpine
                container_name: lfds-nginx
                restart: unless-stopped
                ports:
                  - "80:80"
                volumes:
                  - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
                depends_on:
                  - app
                networks:
                  - lfds-network

            volumes:
              mongo-data:

            networks:
              lfds-network:
                driver: bridge
            COMPOSEEOF

            # Replace placeholders with actual secret values
            sed -i "s|DOCKER_USER_PLACEHOLDER|${{ secrets.DOCKER_USERNAME }}|g" ~/foodflux/docker-compose.yml
            sed -i "s|SESSION_SECRET_PLACEHOLDER|${{ secrets.SESSION_SECRET }}|g" ~/foodflux/docker-compose.yml
            sed -i "s|GMAIL_PLACEHOLDER|${{ secrets.GMAIL_APP_PASSWORD }}|g" ~/foodflux/docker-compose.yml

            # Write Nginx reverse proxy config
            cat > ~/foodflux/nginx/nginx.conf << 'NGINXEOF'
            server {
                listen 80;
                server_name _;

                location / {
                    proxy_pass         http://app:3000;
                    proxy_http_version 1.1;
                    proxy_set_header   Upgrade $http_upgrade;
                    proxy_set_header   Connection 'upgrade';
                    proxy_set_header   Host $host;
                    proxy_set_header   X-Real-IP $remote_addr;
                    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header   X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                }
            }
            NGINXEOF

            # Pull latest image and deploy
            docker pull ${{ secrets.DOCKER_USERNAME }}/foodflux:latest
            cd ~/foodflux
            docker compose down || true
            docker compose up -d
            docker image prune -f
            echo "✅ Deployment complete!"
